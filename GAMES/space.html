<!doctype html>
<html>
    <head>
        <title>Stone Paper Scissors</title>
        <link rel="stylesheet" href="space-style.css">
    </head>
    <body>
        <div class="head">Stone Paper Scissors</div>
        <div class="box">
        <div class="stone">
            <img src="picture/stone.jpg">
        </div>
        <div class="paper">
            <img src="picture/paper.jpg">
        </div>
        <div class="scissors">
            <img src="picture/scissors.jpg">
        </div>
        </div>
        <div class="text-box">
        <div id="you">You:</div>
        <div id="oppo">Oppo:</div>
        </div>
        <div class="num-box">
        <div id="you-num">0</div>
        <div id="oppo-num">0</div>
        </div>
        <div class="msg">
            Start the Game!
        </div>
        
    <script src="space-logic.js"></script>    
    </body>
</html>
